<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PRCA Historical World Champions</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f4ee;
        --ink: #1e2930;
        --muted: #64727b;
        --line: #d8d1c6;
        --accent: #9f4f2f;
        --accent-ink: #fff8f2;
        --panel: #fffdf8;
        --field: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171a1c;
          --ink: #f3efe8;
          --muted: #a8b0b6;
          --line: #343a3f;
          --accent: #d7865a;
          --accent-ink: #24120a;
          --panel: #202427;
          --field: #171a1c;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3.2rem);
        line-height: 1.05;
      }

      p {
        color: var(--muted);
        margin: 8px 0 0;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin: 24px 0;
      }

      .stat,
      .controls,
      .table-wrap {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .stat {
        padding: 16px;
      }

      .stat strong {
        display: block;
        font-size: 1.7rem;
        line-height: 1;
      }

      .stat span {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(180px, 1.2fr) minmax(220px, 1.4fr) repeat(2, minmax(110px, 0.55fr)) auto;
        gap: 12px;
        align-items: end;
        margin-bottom: 16px;
        padding: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      select,
      input,
      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }

      select,
      input {
        width: 100%;
        background: var(--field);
        color: var(--ink);
        padding: 0 10px;
      }

      button {
        background: var(--accent);
        color: var(--accent-ink);
        cursor: pointer;
        font-weight: 800;
        padding: 0 16px;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .result-line {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0 0 10px;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
      }

      th {
        position: sticky;
        top: 0;
        background: var(--panel);
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .empty {
        padding: 28px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 820px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .controls {
          grid-template-columns: 1fr 1fr;
        }

        .controls label:nth-child(2),
        .controls button {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 20px, 1120px);
          padding: 24px 0;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .result-line {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PRCA Historical World Champions</h1>
          <p>Compiled from PRCA historical champions text into structured JSON.</p>
        </div>
        <a href="past-champions.json">JSON</a>
      </header>

      <section class="stats" id="stats"></section>

      <form class="controls" id="filters">
        <label>
          Event
          <select id="eventFilter">
            <option value="">All events</option>
          </select>
        </label>
        <label>
          Search
          <input id="searchFilter" type="search" placeholder="Athlete or hometown" />
        </label>
        <label>
          From
          <input id="fromYear" type="number" inputmode="numeric" />
        </label>
        <label>
          To
          <input id="toYear" type="number" inputmode="numeric" />
        </label>
        <button type="reset">Clear</button>
      </form>

      <div class="result-line">
        <span id="resultCount"></span>
        <span id="activeFilters"></span>
      </div>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th>Event</th>
              <th>Athlete</th>
              <th>Hometown</th>
            </tr>
          </thead>
          <tbody id="champions"></tbody>
        </table>
      </section>
    </main>

    <script>
      const stats = document.querySelector("#stats");
      const champions = document.querySelector("#champions");
      const filters = document.querySelector("#filters");
      const eventFilter = document.querySelector("#eventFilter");
      const searchFilter = document.querySelector("#searchFilter");
      const fromYear = document.querySelector("#fromYear");
      const toYear = document.querySelector("#toYear");
      const resultCount = document.querySelector("#resultCount");
      const activeFilters = document.querySelector("#activeFilters");

      const escapeHtml = (value) =>
        String(value).replace(/[&<>"']/g, (char) => {
          const escapes = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
          return escapes[char];
        });

      const renderRows = (records) => {
        champions.innerHTML = records.length
          ? records
              .map(
                (record) => `<tr>
                  <td>${escapeHtml(record.year)}</td>
                  <td>${escapeHtml(record.event)}</td>
                  <td>${escapeHtml(record.athlete)}</td>
                  <td>${escapeHtml(record.hometown)}</td>
                </tr>`,
              )
              .join("")
          : `<tr><td class="empty" colspan="4">No champions match those filters.</td></tr>`;
      };

      fetch("past-champions.json")
        .then((response) => response.json())
        .then((records) => {
          const eventCounts = records.reduce((counts, record) => {
            counts[record.event] = (counts[record.event] || 0) + 1;
            return counts;
          }, {});

          stats.innerHTML = [
            ["Records", records.length],
            ["Events", Object.keys(eventCounts).length],
            ["First Year", Math.min(...records.map((record) => Number(record.year)))],
            ["Latest Year", Math.max(...records.map((record) => Number(record.year)))],
          ]
            .map(([label, value]) => `<div class="stat"><strong>${value}</strong><span>${label}</span></div>`)
            .join("");

          Object.keys(eventCounts)
            .sort()
            .forEach((event) => {
              const option = document.createElement("option");
              option.value = event;
              option.textContent = `${event} (${eventCounts[event]})`;
              eventFilter.append(option);
            });

          const years = records.map((record) => Number(record.year));
          fromYear.min = Math.min(...years);
          fromYear.max = Math.max(...years);
          fromYear.value = fromYear.min;
          toYear.min = fromYear.min;
          toYear.max = fromYear.max;
          toYear.value = toYear.max;

          const applyFilters = () => {
            const event = eventFilter.value;
            const query = searchFilter.value.trim().toLowerCase();
            const start = Number(fromYear.value || fromYear.min);
            const end = Number(toYear.value || toYear.max);

            const filtered = records.filter((record) => {
              const year = Number(record.year);
              const haystack = `${record.athlete} ${record.hometown}`.toLowerCase();
              return (!event || record.event === event) && (!query || haystack.includes(query)) && year >= start && year <= end;
            });

            resultCount.textContent = `${filtered.length.toLocaleString()} of ${records.length.toLocaleString()} records`;
            activeFilters.textContent = [event || "All events", `${start}-${end}`, query && `"${query}"`].filter(Boolean).join(" / ");
            renderRows(filtered);
          };

          filters.addEventListener("input", applyFilters);
          filters.addEventListener("reset", () => {
            window.setTimeout(() => {
              fromYear.value = fromYear.min;
              toYear.value = toYear.max;
              applyFilters();
            });
          });

          applyFilters();
        });
    </script>
  </body>
</html>
